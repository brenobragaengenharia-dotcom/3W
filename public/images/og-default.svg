<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Fundo escuro com gradiente -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e50914" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Barra lateral vermelha -->
  <rect x="0" y="0" width="8" height="630" fill="#e50914"/>

  <!-- Accent glow esquerdo -->
  <rect x="0" y="200" width="400" height="230" fill="url(#accent)" opacity="0.15"/>

  <!-- Grid decorativo (fundo) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Logo "3W" grande -->
  <text x="80" y="360" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="220" fill="#e50914" opacity="0.15" letter-spacing="-10">3W</text>

  <!-- Logo principal -->
  <text x="80" y="290" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="130" fill="#e50914" letter-spacing="-5">3W</text>

  <!-- Linha divisória -->
  <rect x="80" y="310" width="420" height="4" rx="2" fill="#e50914" opacity="0.4"/>

  <!-- "ENTRETENIMENTO" -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="#ffffff" letter-spacing="8">ENTRETENIMENTO</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-weight="400" font-size="26" fill="#737373" letter-spacing="2">Seu Universo de Entretenimento</text>

  <!-- Categorias (decorativas) -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="18" fill="#e50914" opacity="0.7">🎬 Filmes</text>
  <text x="210" y="510" font-family="Arial, sans-serif" font-size="18" fill="#e50914" opacity="0.7">📺 Séries</text>
  <text x="340" y="510" font-family="Arial, sans-serif" font-size="18" fill="#e50914" opacity="0.7">🎵 Música</text>
  <text x="470" y="510" font-family="Arial, sans-serif" font-size="18" fill="#e50914" opacity="0.7">🎮 Jogos</text>
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="18" fill="#e50914" opacity="0.7">🎪 Eventos</text>

  <!-- URL -->
  <text x="80" y="575" font-family="Arial, sans-serif" font-size="20" fill="#404040" letter-spacing="1">3w-entretenimento.com</text>

  <!-- Decoração direita -->
  <circle cx="950" cy="315" r="220" fill="#e50914" opacity="0.04"/>
  <circle cx="950" cy="315" r="160" fill="#e50914" opacity="0.04"/>
  <circle cx="950" cy="315" r="100" fill="#e50914" opacity="0.06"/>
</svg>
