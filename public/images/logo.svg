<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- Background -->
  <rect width="280" height="60" rx="8" fill="#0d0d0d"/>

  <!-- "3W" em vermelho -->
  <text x="16" y="44" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" fill="#FF6600" letter-spacing="-1">3W</text>

  <!-- Separador -->
  <rect x="90" y="12" width="2" height="36" rx="1" fill="#2a2a2a"/>

  <!-- "Entretenimento" em branco -->
  <text x="100" y="30" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#ffffff" letter-spacing="1.5">ENTRETENIMENTO</text>

  <!-- Tagline -->
  <text x="100" y="46" font-family="Arial, sans-serif" font-weight="400" font-size="9" fill="#737373" letter-spacing="0.5">Seu Universo de Entretenimento</text>
</svg>
