name: Preview - testar novo formato (NAO commita)
on:
  workflow_dispatch:
    inputs:
      quantidade:
        description: 'Quantas noticias mostrar (1-3)'
        type: choice
        options: ['1', '2', '3']
        default: '1'

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Gerar .env.local com as keys
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          cat > .env.local <<ENV
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          GNEWS_API_KEY=$GNEWS_API_KEY
          ENV

      - name: Escrever scripts/preview-noticia.mjs
        run: |
          cat > scripts/preview-noticia.mjs << 'MJS'
          import { readFileSync, existsSync } from 'fs';
          import { fetchAllRss } from './lib/rss.js';
          import { fetchGnews } from './lib/gnews.js';
          import { rewriteNoticia } from './lib/news-rewrite.js';

          // Carrega .env.local
          if (existsSync('.env.local')) {
            for (const line of readFileSync('.env.local', 'utf-8').split('\n')) {
              const [k, ...rest] = line.split('=');
              if (k?.trim() && !k.startsWith('#')) process.env[k.trim()] = rest.join('=').trim();
            }
          }

          const QUANTIDADE = parseInt(process.argv[2] || '1', 10);

          const config = JSON.parse(readFileSync('config/news-sources.json', 'utf-8'));
          const content = JSON.parse(readFileSync('lib/content.json', 'utf-8'));

          // URLs ja publicadas
          const urlsPublicadas = new Set();
          for (const sec of ['noticias', 'esportes']) {
            for (const slug of Object.keys(content[sec] || {})) {
              const url = content[sec][slug]?.fonte?.url;
              if (url) {
                try {
                  const u = new URL(url);
                  ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid','gclid'].forEach((p) => u.searchParams.delete(p));
                  u.hash = '';
                  urlsPublicadas.add(u.toString().replace(/\/$/, ''));
                } catch { urlsPublicadas.add(url); }
              }
            }
          }

          console.log('==> Buscando RSS + GNews...');
          const [rss, gnews] = await Promise.all([
            fetchAllRss(config.rss || []),
            fetchGnews(config.gnews),
          ]);
          console.log(`    rss=${rss.length}  gnews=${gnews.length}`);

          // Dedupe + filtra publicadas + filtra corpo minimo
          const seen = new Map();
          for (const it of [...rss, ...gnews]) {
            try {
              const u = new URL(it.url);
              ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid','gclid'].forEach((p) => u.searchParams.delete(p));
              u.hash = '';
              const k = u.toString().replace(/\/$/, '');
              if (urlsPublicadas.has(k)) continue;
              if (!seen.has(k)) seen.set(k, it);
            } catch {}
          }
          const candidatos = [...seen.values()];
          console.log(`    candidatos nao publicados: ${candidatos.length}\n`);

          // Pega QUANTIDADE itens variando o tamanho do corpo (curto/medio/longo)
          const ordenados = candidatos
            .map((it) => ({ ...it, _palavras: ((it.corpo_original || it.descricao || '').trim().split(/\s+/).filter(Boolean).length) }))
            .filter((it) => it._palavras >= 15)
            .sort((a, b) => a._palavras - b._palavras);

          // Pega 1 curto, 1 medio, 1 longo (se quantidade >= 3)
          const escolhidos = [];
          if (ordenados.length > 0) escolhidos.push(ordenados[0]); // curto
          if (QUANTIDADE >= 2 && ordenados.length > 2) escolhidos.push(ordenados[Math.floor(ordenados.length / 2)]); // medio
          if (QUANTIDADE >= 3 && ordenados.length > 1) escolhidos.push(ordenados[ordenados.length - 1]); // longo

          for (let i = 0; i < escolhidos.length; i++) {
            const raw = escolhidos[i];
            console.log(`\n${'='.repeat(80)}`);
            console.log(`PREVIEW ${i + 1}/${escolhidos.length}`);
            console.log(`${'='.repeat(80)}`);
            console.log(`Fonte:           ${raw.fonte}`);
            console.log(`URL:             ${raw.url}`);
            console.log(`Titulo bruto:    ${raw.titulo}`);
            console.log(`Palavras bruto:  ${raw._palavras}`);
            console.log(`Categoria:       ${raw.categoria_padrao}`);
            console.log(`---`);

            try {
              const result = await rewriteNoticia(raw);
              const ed = result.editorial;
              const md = result.entrada_mockdata;

              console.log(`\nTITULO REESCRITO: ${md.titulo}`);
              console.log(`DESCRICAO:        ${md.descricao}`);
              console.log(`MANCHETE:         ${ed.manchete}`);
              console.log(`CATEGORIA:        ${md.categoria}`);
              console.log(`TEMPO LEITURA:    ${md.tempo_leitura} min`);
              console.log(`PARAGRAFOS:       ${ed.paragrafos.length}`);
              const totalPalavras = ed.paragrafos.join(' ').trim().split(/\s+/).filter(Boolean).length;
              console.log(`TOTAL PALAVRAS:   ${totalPalavras} (corpo) / ${raw._palavras} (bruto)`);
              console.log(`\n--- PARAGRAFOS ---`);
              ed.paragrafos.forEach((p, idx) => {
                const pal = p.trim().split(/\s+/).filter(Boolean).length;
                console.log(`\n[${idx + 1}] (${pal} palavras)`);
                console.log(p);
              });
              if (ed.frase_destaque) {
                console.log(`\n--- FRASE DESTAQUE ---`);
                console.log(`"${ed.frase_destaque}"`);
              } else {
                console.log(`\n--- FRASE DESTAQUE: vazia (fonte nao tinha citacao forte) ---`);
              }
              if (ed.conclusao) {
                console.log(`\n--- CONCLUSAO ---`);
                console.log(ed.conclusao);
              } else {
                console.log(`\n--- CONCLUSAO: vazia (sem desfecho claro na fonte) ---`);
              }
            } catch (err) {
              console.warn(`ERRO: ${err.message}`);
            }
          }
          console.log(`\n${'='.repeat(80)}\nPREVIEW CONCLUIDO. Nada foi commitado.\n`);
          MJS
          node --check scripts/preview-noticia.mjs

      - name: Rodar preview
        run: node scripts/preview-noticia.mjs ${{ github.event.inputs.quantidade }}

      - name: Limpar .env.local (paranoia)
        if: always()
        run: rm -f .env.local
