name: Atualiza conteúdo (diário 6h BRT)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      forcar_regeneracao:
        description: 'Regenerar TODO o conteúdo (--force)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: atualiza-conteudo
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  atualiza:
    name: Sync TMDB + fetch notícias + geração de conteúdo via Claude
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci --no-audit --no-fund

      - name: Gerar .env.local a partir dos Secrets
        run: |
          cat > .env.local <<EOF
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GNEWS_API_KEY=${{ secrets.GNEWS_API_KEY }}
          EOF

      - name: Sincronizar filmes em cartaz e séries populares (TMDB)
        run: npm run sync-all
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Buscar e publicar notícias novas (RSS + GNews + Claude)
        run: npm run fetch-news
        continue-on-error: true
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Gerar conteúdo editorial (Claude)
        run: |
          if [ "${{ github.event.inputs.forcar_regeneracao }}" = "true" ]; then
            npm run update-content:force
          else
            npm run update-content
          fi
        env:
          NODE_OPTIONS: '--no-warnings'

      - name: Limpar .env.local (paranoia — não fica em artefatos)
        if: always()
        run: rm -f .env.local

      - name: Detectar mudanças
        id: diff
        run: |
          if [ -n "$(git status --porcelain lib/mock-data.js lib/content.json)" ]; then
            echo "tem_mudancas=true" >> "$GITHUB_OUTPUT"
          else
            echo "tem_mudancas=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit e push (se houver mudanças)
        if: steps.diff.outputs.tem_mudancas == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/mock-data.js lib/content.json
          git commit -m "chore(news): ingestão automática $(date +'%Y-%m-%d')"
          git push origin HEAD:master

      - name: Resumo
        run: |
          if [ "${{ steps.diff.outputs.tem_mudancas }}" = "true" ]; then
            echo "✅ Notícias e conteúdo atualizados e commitados. Vercel fará o redeploy automático." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ Nenhuma mudança hoje (feeds sem novidades ou Claude não gerou conteúdo novo)." >> "$GITHUB_STEP_SUMMARY"
          fi
