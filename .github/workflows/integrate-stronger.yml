name: Integrar UA browser na automacao (rss + gnews)
on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Criar scripts/lib/og-image.js (helper compartilhado)
        run: |
          cat > scripts/lib/og-image.js << 'JSEOF'
          // scripts/lib/og-image.js
          // Resolução robusta de og:image com User-Agent de navegador real,
          // variações de URL (www/no-www, trailing slash) e múltiplos padrões.

          const UA_BROWSER = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';

          const COMMON_HEADERS = {
            'User-Agent': UA_BROWSER,
            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
            'Accept-Language': 'pt-BR,pt;q=0.9,en;q=0.8',
            'Cache-Control': 'no-cache',
          };

          export function urlVariations(url) {
            const out = new Set([url]);
            try {
              const u = new URL(url);
              if (u.pathname.endsWith('/')) out.add(u.toString().replace(/\/$/, ''));
              else out.add(u.toString() + '/');
              if (u.hostname.startsWith('www.')) out.add(url.replace('://www.', '://'));
              else out.add(url.replace('://', '://www.'));
            } catch {}
            return [...out];
          }

          export async function fetchPageHtml(url, timeoutMs = 8000) {
            const ac = new AbortController();
            const to = setTimeout(() => ac.abort(), timeoutMs);
            try {
              const res = await fetch(url, { headers: COMMON_HEADERS, signal: ac.signal, redirect: 'follow' });
              clearTimeout(to);
              if (!res.ok) return null;
              return (await res.text()).slice(0, 500000);
            } catch { return null; }
          }

          export function extractOgImage(html) {
            if (!html) return null;
            const candidatos = [
              html.match(/<meta[^>]+property=["']og:image:secure_url["'][^>]+content=["']([^"']+)["']/i),
              html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i),
              html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i),
              html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i),
              html.match(/<meta[^>]+name=["']twitter:image:src["'][^>]+content=["']([^"']+)["']/i),
              html.match(/"image"\s*:\s*"([^"]+\.(?:jpg|jpeg|png|webp)[^"]*)"/i),
            ];
            for (const m of candidatos) if (m) return m[1].replace(/&amp;/g, '&');
            return null;
          }

          export async function isValidImageUrl(url, timeoutMs = 6000) {
            if (!url) return false;
            if (url.startsWith('/')) return true;
            try {
              const ac = new AbortController();
              const to = setTimeout(() => ac.abort(), timeoutMs);
              let res = await fetch(url, { method: 'HEAD', headers: { 'User-Agent': UA_BROWSER }, signal: ac.signal, redirect: 'follow' });
              if (!res.ok) {
                res = await fetch(url, { method: 'GET', headers: { 'User-Agent': UA_BROWSER, 'Range': 'bytes=0-2047' }, signal: ac.signal, redirect: 'follow' });
              }
              clearTimeout(to);
              if (!res.ok && res.status !== 206) return false;
              return (res.headers.get('content-type') || '').toLowerCase().startsWith('image/');
            } catch { return false; }
          }

          export async function resolveOgImage(articleUrl) {
            if (!articleUrl) return null;
            for (const variant of urlVariations(articleUrl)) {
              const html = await fetchPageHtml(variant);
              if (!html) continue;
              const og = extractOgImage(html);
              if (!og) continue;
              if (await isValidImageUrl(og)) return og;
            }
            return null;
          }
          JSEOF
          node --check scripts/lib/og-image.js

      - name: Atualizar scripts/lib/rss.js
        run: |
          cat > scripts/lib/rss.js << 'JSEOF'
          import { resolveOgImage, isValidImageUrl } from './og-image.js';
          export { isValidImageUrl } from './og-image.js';

          const UA = '3W-Entretenimento NewsBot/1.0';

          function stripCdata(s = '') {
            return String(s).replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1').replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&#(\d+);/g, (_, n) => String.fromCharCode(+n)).replace(/\s+/g, ' ').trim();
          }

          function tag(xml, name) {
            const m = xml.match(new RegExp(`<${name}[^>]*>([\\s\\S]*?)<\\/${name}>`, 'i'));
            return m ? stripCdata(m[1]) : '';
          }

          function attr(xml, name, attrName) {
            const m = xml.match(new RegExp(`<${name}[^>]*\\b${attrName}=["']([^"']+)["']`, 'i'));
            return m ? m[1] : '';
          }

          function extractImage(item) {
            let url = attr(item, 'enclosure', 'url');
            if (url) return url;
            url = attr(item, 'media:content', 'url') || attr(item, 'media:thumbnail', 'url');
            if (url) return url;
            const content = tag(item, 'content:encoded') || tag(item, 'description');
            const m = content.match(/<img[^>]+src=["']([^"']+)["']/i);
            return m ? m[1] : null;
          }

          async function resolveImagem(rawXml, articleUrl) {
            const fromFeed = extractImage(rawXml);
            if (fromFeed && (await isValidImageUrl(fromFeed))) return fromFeed;
            return await resolveOgImage(articleUrl);
          }

          function parseRss(xml) {
            const items = [];
            const re = /<(item|entry)[^>]*>([\s\S]*?)<\/\1>/gi;
            let m;
            while ((m = re.exec(xml)) !== null) {
              const raw = m[2];
              const link = tag(raw, 'link') || attr(raw, 'link', 'href') || tag(raw, 'guid');
              const pub = tag(raw, 'pubDate') || tag(raw, 'published') || tag(raw, 'updated');
              items.push({ _raw: raw, titulo: tag(raw, 'title'), descricao: tag(raw, 'description') || tag(raw, 'summary'), corpo_original: tag(raw, 'content:encoded') || tag(raw, 'description') || tag(raw, 'summary'), url: link, data_publicacao: pub || new Date().toISOString(), autor_original: tag(raw, 'dc:creator') || tag(raw, 'author') });
            }
            return items;
          }

          export async function fetchRssFeed(source, timeoutMs = 12000) {
            try {
              const ac = new AbortController();
              const to = setTimeout(() => ac.abort(), timeoutMs);
              const res = await fetch(source.url, { headers: { 'User-Agent': UA, 'Accept': 'application/rss+xml, application/xml, text/xml, */*' }, signal: ac.signal });
              clearTimeout(to);
              if (!res.ok) { console.warn(`[rss] ${source.nome}: HTTP ${res.status}`); return []; }
              const xml = await res.text();
              const items = parseRss(xml);
              const imagens = await Promise.all(items.map((it) => resolveImagem(it._raw, it.url)));
              items.forEach((it, i) => { it.imagem = imagens[i]; delete it._raw; });
              return items.map((it) => ({ ...it, fonte: source.nome, fonte_url: source.url, categoria_padrao: source.categoria_padrao, tags_hint: source.tags_hint || [] }));
            } catch (err) { console.warn(`[rss] ${source.nome}: ${err.message}`); return []; }
          }

          export async function fetchAllRss(sources) {
            const out = await Promise.all(sources.map((s) => fetchRssFeed(s)));
            return out.flat();
          }
          JSEOF
          node --check scripts/lib/rss.js

      - name: Atualizar scripts/lib/gnews.js
        run: |
          cat > scripts/lib/gnews.js << 'JSEOF'
          import { resolveOgImage, isValidImageUrl } from './og-image.js';

          async function resolveGnewsImagem(feedImage, articleUrl) {
            if (feedImage && (await isValidImageUrl(feedImage))) return feedImage;
            return await resolveOgImage(articleUrl);
          }

          export async function fetchGnews(config) {
            if (!config?.enabled) return [];
            const key = process.env.GNEWS_API_KEY;
            if (!key) { console.warn('[gnews] GNEWS_API_KEY ausente'); return []; }
            const all = [];
            for (const q of config.queries || []) {
              const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(q.q)}&lang=pt&country=br&max=${q.max || 5}&apikey=${key}`;
              try {
                const res = await fetch(url);
                if (!res.ok) { console.warn(`[gnews] "${q.q}" HTTP ${res.status}`); continue; }
                const json = await res.json();
                const articles = json.articles || [];
                const imagens = await Promise.all(articles.map((a) => resolveGnewsImagem(a.image, a.url)));
                articles.forEach((a, i) => { all.push({ titulo: a.title, descricao: a.description, corpo_original: a.content || a.description || '', url: a.url, imagem: imagens[i], data_publicacao: a.publishedAt, autor_original: a.source?.name, fonte: a.source?.name || 'GNews', fonte_url: a.source?.url || null, categoria_padrao: q.categoria_padrao, tags_hint: [] }); });
              } catch (err) { console.warn(`[gnews] "${q.q}": ${err.message}`); }
            }
            return all;
          }
          JSEOF
          node --check scripts/lib/gnews.js

      - name: Validar tudo
        run: |
          node --check scripts/lib/og-image.js
          node --check scripts/lib/rss.js
          node --check scripts/lib/gnews.js

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/lib/og-image.js scripts/lib/rss.js scripts/lib/gnews.js
          git status
          git commit -m "feat(noticias): UA browser + variacoes de URL no resolve de og:image" || echo "no changes"
          git push
